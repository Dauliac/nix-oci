StylesPath = .vale/styles
MinAlertLevel = suggestion
Vocab = nix-oci

Packages = Google, write-good, proselint, alex

[docs/content/**/*.md]
BasedOnStyles = Vale, Google, write-good, proselint, alex
# Accept list generates overly strict casing rules for mixed-case terms
Vale.Terms = off
# Too many false positives on technical terms (dive, execute, etc.)
alex.ProfanityUnlikely = off
# Nix code blocks use camelCase identifiers
Google.WordList = off
# Common in technical docs
Google.Latin = warning
# Acronyms are standard in this domain (OCI, CVE, SBOM, DNS, etc.)
Google.Acronyms = off
# Enforce active voice
Google.Passive = error
write-good.Passive = error
