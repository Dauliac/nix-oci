version: "3"
set: [errexit, pipefail, nounset]
shopt: [globstar]
tasks:
  default:
    cmds:
      - task --list
  # ── Tests ──────────────────────────────────────────────────────────────
  #
  # Hermetic (pure, sandboxed):
  #   test:check     All nix flake checks (unit, vm, oci, lint, build, treefmt)
  #   test:unit      nix-unit lib tests
  #   test:vm        NixOS VM deploy integration
  #   test:lint      Formatting + prose
  #
  # Non-hermetic (needs daemon/network):
  #   test:e2e       Bats suites (CST, security scans, multi-arch)
  #
  test:
    desc: Run all tests (hermetic checks + e2e)
    cmds:
      - task: test:check
      - task: test:e2e
  test:check:
    desc: Run all hermetic nix flake checks (via nom)
    deps: ['test:fmt']
    cmds:
      - nix flake check -L 2>&1 | nom
  test:unit:
    desc: Run nix-lib unit tests (nix-unit)
    cmds:
      - nix build .#checks.x86_64-linux.nix-unit -L 2>&1 | nom
  test:vm:
    desc: Run NixOS VM deploy integration test (via nom)
    cmds:
      - nix build .#checks.x86_64-linux.vm-deploy-integration -L 2>&1 | nom
  test:lint:
    desc: Run lint checks (treefmt + vale)
    cmds:
      - nix build .#checks.x86_64-linux.treefmt .#checks.x86_64-linux.lint-vale -L 2>&1 | nom
  test:e2e:
    desc: Run non-hermetic e2e bats suites (needs daemon)
    dir: ./tests/e2e/bats/
    cmds:
      - |
        # Pre-compute flake discovery once to avoid SQLite contention
        # when multiple bats files run setup_file() in parallel.
        FLAKE_REF="git+file://$(git rev-parse --show-toplevel)"
        system="$(uname -m | sed 's/x86_64/x86_64-linux/;s/aarch64/aarch64-linux/')"
        export NIX_OCI_APPS_JSON=$(nix eval --json "${FLAKE_REF}#apps.${system}" --apply builtins.attrNames)
        export NIX_OCI_PKGS_JSON=$(nix eval --json "${FLAKE_REF}#packages.${system}" --apply builtins.attrNames)
        export NIX_OCI_FLAKE_REF="$FLAKE_REF"
        export NIX_OCI_SYSTEM="$system"
        bats . --jobs {{.BATS_JOBS | default "3"}} --timing --trace --print-output-on-failure
  test:fmt:
    desc: Format the project tree with nix fmt
    cmds:
      - nix fmt
  # ── Docs ───────────────────────────────────────────────────────────────
  docs:build:
    desc: Build the nix-oci documentation site with NDG
    cmds:
      - nix build .#legacyPackages.x86_64-linux.docs --out-link result-docs
  docs:serve:
    desc: Build and serve the nix-oci documentation site locally
    deps: ['docs:build']
    cmds:
      - |
        echo "Serving docs at http://localhost:8000"
        python3 -m http.server 8000 --directory result-docs
  flake-parts-website:build:
    desc: Build the flake.parts website (includes nix-oci options)
    dir: ./docs/flake-parts-website
    cmds:
      - nix build --out-link ../../result-flake-parts-website
  flake-parts-website:serve:
    desc: Build and serve the flake.parts website locally
    deps: ['flake-parts-website:build']
    cmds:
      - |
        echo "Serving flake.parts website at http://localhost:8001"
        python3 -m http.server 8001 --directory result-flake-parts-website
  # ── Lint ──────────────────────────────────────────────────────────
  lint:docs:
    desc: Lint documentation prose with Vale
    cmds:
      - vale sync
      - vale docs/content/
  lint:docs:sync:
    desc: Download/update Vale style packages
    cmds:
      - vale sync
  # ── CI ─────────────────────────────────────────────────────────────────
  ci:local:
    desc: Run the CI GitHub Actions workflow locally with act
    cmds:
      - act push --workflows .github/workflows/ci.yml --verbose
  ci:local:dry:
    desc: Dry-run the CI workflow with act (list jobs without executing)
    cmds:
      - act push --workflows .github/workflows/ci.yml --list
