schemaVersion: 2.0.0
metadataTest:
  envVars:
    - key: USER
      value: nginx
    - key: SSL_CERT_FILE
      value: /etc/ssl/certs/ca-bundle.crt
fileExistenceTests:
  - name: "passwd file exists"
    path: "/etc/passwd"
    shouldExist: true
  - name: "group file exists"
    path: "/etc/group"
    shouldExist: true
  - name: "nginx binary exists"
    path: "/bin/nginx"
    shouldExist: true
fileContentTests:
  - name: "nginx user in passwd"
    path: "/etc/passwd"
    expectedContents:
      - "nginx:x:"
  - name: "nginx group in group file"
    path: "/etc/group"
    expectedContents:
      - "nginx:x:"
