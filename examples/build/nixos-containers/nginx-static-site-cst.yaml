schemaVersion: 2.0.0
metadataTest:
  envVars:
    - key: USER
      value: root
fileExistenceTests:
  # FHS directories
  - name: "/tmp directory exists"
    path: "/tmp"
    shouldExist: true
  - name: "/bin directory exists"
    path: "/bin"
    shouldExist: true
  # Main binary
  - name: "nginx binary exists and is executable"
    path: "/bin/nginx"
    shouldExist: true
    isExecutableBy: "any"
  # Shadow and identity files
  - name: "passwd file exists"
    path: "/etc/passwd"
    shouldExist: true
commandTests:
  - name: "curl is available (healthcheck tool)"
    command: "curl"
    args:
      - "--version"
    expectedOutput:
      - "curl"
fileContentTests:
  - name: "root user in passwd"
    path: "/etc/passwd"
    expectedContents:
      - "root:x:0:0"
