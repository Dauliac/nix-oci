schemaVersion: 2.0.0
metadataTest:
  envVars:
    - key: USER
      value: root
    - key: LD_PRELOAD
      isRegex: true
      value: ".*libmimalloc\\.so"
    - key: GLIBC_TUNABLES
      isRegex: true
      value: "glibc\\.malloc\\.arena_max=2"
  labels:
    - key: "io.github.dauliac.nix-oci.performance.enabled"
      value: "true"
    - key: "io.github.dauliac.nix-oci.performance.allocator"
      value: "mimalloc"
fileExistenceTests:
  # FHS directories
  - name: "/tmp directory exists"
    path: "/tmp"
    shouldExist: true
  - name: "/bin directory exists"
    path: "/bin"
    shouldExist: true
  # Shadow and identity files
  - name: "passwd file exists"
    path: "/etc/passwd"
    shouldExist: true
  - name: "group file exists"
    path: "/etc/group"
    shouldExist: true
  # Main binary
  - name: "nginx binary exists and is executable"
    path: "/bin/nginx"
    shouldExist: true
    isExecutableBy: "any"
commandTests:
  # Verify mimalloc shared library is present in the image
  - name: "mimalloc shared library exists"
    command: "sh"
    args:
      - "-c"
      - "find / -name 'libmimalloc.so' -print -quit 2>/dev/null | grep -q ."
    exitCode: 0
fileContentTests:
  - name: "root user in passwd"
    path: "/etc/passwd"
    expectedContents:
      - "root:x:0:0"
