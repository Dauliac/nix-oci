schemaVersion: 2.0.0
metadataTest:
  envVars:
    - key: USER
      value: nixosRedisCst
fileExistenceTests:
  - name: "redis-server binary exists"
    path: "/bin/redis-server"
    shouldExist: true
  - name: "passwd file exists"
    path: "/etc/passwd"
    shouldExist: true
  - name: "SSL CA bundle exists"
    path: "/etc/ssl/certs/ca-bundle.crt"
    shouldExist: true
  - name: "home directory exists"
    path: "/home/nixosRedisCst"
    shouldExist: true
fileContentTests:
  - name: "non-root user in passwd"
    path: "/etc/passwd"
    expectedContents:
      - "nixosRedisCst:x:4000:4000"
