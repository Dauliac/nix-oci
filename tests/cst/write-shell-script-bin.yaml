schemaVersion: 2.0.0
metadataTest:
  envVars:
    - key: USER
      value: hello-script
fileExistenceTests:
  - name: "hello-script binary exists"
    path: "/bin/hello-script"
    shouldExist: true
commandTests:
  - name: "hello-script runs"
    command: "hello-script"
    expectedOutput:
      - "Hello from writeShellScriptBin!"
