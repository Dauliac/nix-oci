schemaVersion: 2.0.0
metadataTest:
  labels:
    - key: "io.github.dauliac.nix-oci.hardening.enabled"
      value: "true"
    - key: "io.github.dauliac.nix-oci.hardening.no-new-privileges"
      value: "true"
    - key: "io.github.dauliac.nix-oci.hardening.read-only-rootfs"
      value: "true"
    - key: "io.github.dauliac.nix-oci.hardening.capabilities-drop"
      value: "ALL"
    - key: "io.github.dauliac.nix-oci.hardening.capabilities-add"
      value: "NET_BIND_SERVICE"
    - key: "io.github.dauliac.nix-oci.hardening.seccomp-profile"
      value: "strict"
    - key: "io.github.dauliac.nix-oci.hardening.dns-disabled"
      value: "true"
    - key: "io.github.dauliac.nix-oci.hardening.tls-trust-store-removed"
      value: "true"
  envVars:
    - key: USER
      value: root
fileExistenceTests:
  - name: "resolv.conf exists"
    path: "/etc/resolv.conf"
    shouldExist: true
  - name: "nsswitch.conf exists"
    path: "/etc/nsswitch.conf"
    shouldExist: true
  - name: "ca-bundle.crt exists (neutered)"
    path: "/etc/ssl/certs/ca-bundle.crt"
    shouldExist: true
  - name: "busybox binary exists"
    path: "/bin/busybox"
    shouldExist: true
  - name: "no shell at /bin/sh should NOT exist (busybox provides it though)"
    path: "/bin/busybox"
    shouldExist: true
fileContentTests:
  - name: "resolv.conf has hardening marker"
    path: "/etc/resolv.conf"
    expectedContents:
      - "DNS disabled by nix-oci hardening"
  - name: "nsswitch.conf has files-only hosts"
    path: "/etc/nsswitch.conf"
    expectedContents:
      - "hosts:"
      - "files"
    excludedContents:
      - "hosts:     files dns"
  - name: "ca-bundle.crt has removal marker"
    path: "/etc/ssl/certs/ca-bundle.crt"
    expectedContents:
      - "TLS trust store removed by nix-oci hardening"
commandTests:
  # -- DNS hardening behavioral checks --
  - name: "resolv.conf contains no nameserver entries"
    command: "grep"
    args: ["-c", "nameserver", "/etc/resolv.conf"]
    exitCode: 1
  - name: "nsswitch hosts line does not contain dns backend"
    command: "sh"
    args:
      - "-c"
      - "grep '^hosts:' /etc/nsswitch.conf | grep -w dns"
    exitCode: 1
  # -- TLS hardening behavioral checks --
  - name: "ca-bundle.crt contains no real certificates"
    command: "grep"
    args: ["-c", "BEGIN CERTIFICATE", "/etc/ssl/certs/ca-bundle.crt"]
    exitCode: 1
  - name: "ca-bundle.crt is tiny (neutered, not real cert bundle)"
    command: "sh"
    args:
      - "-c"
      - "test $(wc -c < /etc/ssl/certs/ca-bundle.crt) -lt 200"
  # -- General sanity --
  - name: "busybox runs"
    command: "busybox"
    args: ["--help"]
  - name: "passwd file exists and has entries"
    command: "sh"
    args:
      - "-c"
      - "test $(wc -l < /etc/passwd) -gt 0"
