schemaVersion: 2.0.0
metadataTest:
  envVars:
    - key: USER
      value: root
fileExistenceTests:
  - name: "bash binary exists"
    path: "/bin/bash"
    shouldExist: true
commandTests:
  - name: "bash runs"
    command: "bash"
    args:
      - "--version"
  - name: "coreutils ls runs"
    command: "ls"
    args:
      - "--version"
  - name: "whoami is root"
    command: "whoami"
    expectedOutput:
      - "root"
